<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cryptex Pro | Trading Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0d14;
            --surface: #111620;
            --surface2: #171d2b;
            --card: #1a2032;
            --border: #1e293b;
            --text: #e8edf5;
            --text2: #8896aa;
            --text3: #5c6b82;
            --gold: #f0b90b;
            --green: #0ecb81;
            --red: #f6465d;
            --blue: #3772ff;
            --purple: #a855f7;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            min-height: 100vh;
        }

        .hidden { display: none !important; }

        /* Auth Screen */
        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0d14, #111620, #0a0d14);
            padding: 20px;
        }

        .auth-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
            font-weight: 900;
            color: var(--gold);
        }

        .auth-tabs {
            display: flex;
            background: var(--surface2);
            border-radius: 10px;
            margin-bottom: 24px;
            padding: 4px;
        }

        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text2);
            transition: 0.3s;
            font-size: 14px;
        }

        .auth-tab.active {
            background: var(--gold);
            color: #000;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: var(--text2);
            font-size: 12px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus {
            border-color: var(--gold);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold), #ffd75d);
            color: #000;
        }

        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(240,185,11,0.3); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-top: 12px;
            font-size: 13px;
            display: none;
        }

        .alert.show { display: block; }
        .alert-error { background: rgba(246,70,93,0.1); color: var(--red); border: 1px solid rgba(246,70,93,0.3); }
        .alert-success { background: rgba(14,203,129,0.1); color: var(--green); border: 1px solid rgba(14,203,129,0.3); }

        /* Dashboard */
        .dashboard {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 250px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            font-size: 20px;
            font-weight: 800;
            color: var(--gold);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-nav {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            border-radius: 10px;
            color: var(--text2);
            transition: 0.2s;
            margin-bottom: 4px;
            font-weight: 500;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 13px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text); }
        .nav-item.active { background: var(--gold); color: #000; font-weight: 700; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-gold { background: rgba(240,185,11,0.15); color: var(--gold); }
        .badge-green { background: rgba(14,203,129,0.15); color: var(--green); }
        .badge-red { background: rgba(246,70,93,0.15); color: var(--red); }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .grid { display: grid; gap: 16px; }
        .grid-4 { grid-template-columns: repeat(4, 1fr); }
        .grid-2 { grid-template-columns: 1fr 1fr; }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: 0.3s;
            cursor: pointer;
        }

        .stat-card:hover {
            border-color: var(--border);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .stat-icon.gold { background: rgba(240,185,11,0.15); color: var(--gold); }
        .stat-icon.green { background: rgba(14,203,129,0.15); color: var(--green); }
        .stat-icon.blue { background: rgba(55,114,255,0.15); color: var(--blue); }
        .stat-icon.purple { background: rgba(168,85,247,0.15); color: var(--purple); }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-body { padding: 20px; }
        .card-body.no-pad { padding: 0; }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 12px 20px;
            text-align: left;
            font-size: 10px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(30,41,59,0.5);
            font-size: 13px;
        }

        tr:hover td { background: rgba(255,255,255,0.01); }

        .coin-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .coin-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
        }

        .coin-icon.btc { background: rgba(247,147,26,0.2); color: #f7931a; }
        .coin-icon.eth { background: rgba(98,126,234,0.2); color: #627eea; }
        .coin-icon.sol { background: rgba(153,69,255,0.2); color: #9945ff; }

        .price-up { color: var(--green); }
        .price-down { color: var(--red); }

        .btn-sm {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            background: rgba(14,203,129,0.15);
            color: var(--green);
        }

        .btn-sm:hover { background: rgba(14,203,129,0.25); }

        .trade-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .trade-tabs {
            display: flex;
            background: var(--surface2);
            border-radius: 8px;
            padding: 3px;
        }

        .trade-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            border: none;
            background: transparent;
            color: var(--text2);
            transition: 0.2s;
        }

        .trade-tab.active.buy { background: var(--green); color: #000; }
        .trade-tab.active.sell { background: var(--red); color: #fff; }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .input-group label {
            font-size: 11px;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-group input {
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus { border-color: var(--gold); }

        .pct-btns {
            display: flex;
            gap: 4px;
        }

        .pct-btn {
            flex: 1;
            padding: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text2);
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: 0.2s;
        }

        .pct-btn:hover { border-color: var(--gold); color: var(--gold); }

        .order-btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .order-btn.buy { background: var(--green); color: #000; }
        .order-btn.sell { background: var(--red); color: #fff; }

        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 14px 20px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        @keyframes slideIn {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .toast-success { background: #0a2e1f; color: #a3f0d0; border: 1px solid rgba(14,203,129,0.3); }
        .toast-error { background: #2e0a15; color: #fec1cb; border: 1px solid rgba(246,70,93,0.3); }
        .toast-info { background: #0a1a2e; color: #b8d4fe; border: 1px solid rgba(55,114,255,0.3); }

        @media (max-width: 1024px) {
            .grid-4 { grid-template-columns: repeat(2, 1fr); }
            .grid-2 { grid-template-columns: 1fr; }
        }

        @media (max-width: 768px) {
            .dashboard { flex-direction: column; }
            .sidebar { width: 100%; height: auto; }
            .sidebar-nav { display: flex; flex-direction: row; overflow-x: auto; }
            .nav-item { white-space: nowrap; }
            .grid-4 { grid-template-columns: 1fr; }
            .topbar { flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div class="auth-logo">◈ CryptexPro</div>
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
            </div>
            <form id="authForm" onsubmit="handleAuth(event)">
                <div id="registerFields" class="hidden">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="fullName" placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>ID Name</label>
                        <input type="text" id="idName" placeholder="Aadhaar / Passport">
                    </div>
                    <div class="form-group">
                        <label>ID Number</label>
                        <input type="text" id="idNumber" placeholder="123456789012">
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••" minlength="6">
                </div>
                <button type="submit" class="btn btn-gold" id="authBtn">Login</button>
                <div class="alert" id="authAlert"></div>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardScreen" class="dashboard hidden">
        <aside class="sidebar">
            <div class="sidebar-header">◈ CryptexPro</div>
            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="switchView('overview')">📊 Overview</button>
                <button class="nav-item" onclick="switchView('market')">📈 Market</button>
                <button class="nav-item" onclick="switchView('trade')">💹 Trade</button>
                <button class="nav-item" onclick="switchView('portfolio')">💼 Portfolio</button>
                <button class="nav-item" onclick="switchView('wallet')">💰 Wallet</button>
            </nav>
            <div style="padding:16px;">
                <button class="btn" style="background:var(--red);color:#fff;" onclick="logout()">🚪 Logout</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div>
                    <span style="font-weight:700;" id="pageTitle">📊 Overview</span>
                    <span class="badge badge-green" style="margin-left:10px;">● Live</span>
                </div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span style="color:var(--text2);">👤 <strong id="displayName">-</strong></span>
                    <span class="badge badge-gold">💰 <strong id="displayBalance">₹0</strong></span>
                    <span class="badge" id="verifyBadge" style="background:rgba(246,70,93,0.15);color:var(--red);">⏳</span>
                    <button class="btn btn-gold" style="width:auto;padding:8px 16px;" onclick="refreshAll()">🔄</button>
                </div>
            </header>

            <div class="content-area">
                <!-- Overview -->
                <div id="overviewView">
                    <div class="grid grid-4" style="margin-bottom:20px;">
                        <div class="stat-card">
                            <div class="stat-icon gold">💰</div>
                            <div class="stat-value" style="color:var(--gold);" id="ovBalance">₹0</div>
                            <div class="stat-label">Total Balance</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon green">📈</div>
                            <div class="stat-value" style="color:var(--green);" id="ovTrades">0</div>
                            <div class="stat-label">Total Trades</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon blue">💎</div>
                            <div class="stat-value" style="color:var(--blue);" id="ovLoan">₹0</div>
                            <div class="stat-label">Loan Amount</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon purple">⭐</div>
                            <div class="stat-value" style="color:var(--purple);" id="ovStatus">-</div>
                            <div class="stat-label">Loan Status</div>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">📈 Live Market</div>
                        <div class="card-body" id="marketOverview"></div>
                    </div>
                </div>

                <!-- Market -->
                <div id="marketView" class="hidden">
                    <div class="card">
                        <div class="card-header">
                            <span>All Markets</span>
                            <input type="text" placeholder="Search..." style="padding:8px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);width:200px;" oninput="filterMarket(this.value)">
                        </div>
                        <div class="card-body no-pad">
                            <table>
                                <thead><tr><th>Pair</th><th>Price</th><th>24h Change</th><th>Action</th></tr></thead>
                                <tbody id="marketTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Trade -->
                <div id="tradeView" class="hidden">
                    <div class="grid grid-2">
                        <div class="card">
                            <div class="card-header">
                                <span>Chart</span>
                                <select id="tradeSymbol" style="padding:8px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;" onchange="updateTradeInfo()"></select>
                            </div>
                            <div class="card-body">
                                <div style="font-size:36px;font-weight:800;margin:10px 0;" id="currentPrice">₹0</div>
                                <canvas id="priceChart" height="250"></canvas>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">Place Order</div>
                            <div class="card-body">
                                <div class="trade-box">
                                    <div class="trade-tabs">
                                        <button class="trade-tab active buy" onclick="setTradeMode('buy')">Buy</button>
                                        <button class="trade-tab sell" onclick="setTradeMode('sell')">Sell</button>
                                    </div>
                                    <div class="input-group">
                                        <label>Quantity</label>
                                        <input type="number" id="tradeQty" placeholder="0.00" step="0.01" oninput="calcTotal()">
                                    </div>
                                    <div class="pct-btns">
                                        <button class="pct-btn" onclick="setPct(25)">25%</button>
                                        <button class="pct-btn" onclick="setPct(50)">50%</button>
                                        <button class="pct-btn" onclick="setPct(75)">75%</button>
                                        <button class="pct-btn" onclick="setPct(100)">100%</button>
                                    </div>
                                    <div class="input-group">
                                        <label>Total</label>
                                        <input type="text" id="tradeTotal" readonly>
                                    </div>
                                    <button class="order-btn buy" id="orderBtn" onclick="executeTrade()">Buy</button>
                                    <div class="alert" id="tradeAlert"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Portfolio -->
                <div id="portfolioView" class="hidden">
                    <div class="card">
                        <div class="card-header">Holdings</div>
                        <div class="card-body no-pad">
                            <table>
                                <thead><tr><th>Symbol</th><th>Quantity</th><th>Buy Price</th><th>Current</th><th>P&L</th></tr></thead>
                                <tbody id="holdingsTable"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Wallet -->
                <div id="walletView" class="hidden">
                    <div class="grid grid-2">
                        <div class="card">
                            <div class="card-header">Deposit</div>
                            <div class="card-body">
                                <div class="input-group">
                                    <label>Amount (₹)</label>
                                    <input type="number" id="depositAmt" placeholder="500">
                                </div>
                                <button class="btn btn-gold" style="margin-top:12px;" onclick="deposit()">Deposit</button>
                                <div class="alert" id="depositAlert"></div>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header">Withdraw</div>
                            <div class="card-body">
                                <div class="input-group">
                                    <label>Amount (₹)</label>
                                    <input type="number" id="withdrawAmt" placeholder="1000">
                                </div>
                                <button class="btn" style="margin-top:12px;background:var(--red);color:#fff;" onclick="withdraw()">Withdraw</button>
                                <div class="alert" id="withdrawAlert"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>

        function $(id) { return document.getElementById(id); }
        function fmt(n) { return '₹' + Number(n).toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2}); }

        function toast(msg, type='info') {
            const t = document.createElement('div');
            t.className = `toast toast-${type}`;
            t.textContent = msg;
            $('toastContainer').appendChild(t);
            setTimeout(() => { t.style.opacity='0'; t.style.transition='0.3s'; setTimeout(() => t.remove(),300); }, 3000);
        }

        function showAlert(id, msg, type) {
            const el = $(id);
            if (!el) return;
            el.textContent = msg;
            el.className = `alert alert-${type} show`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }

        // ==================== API ====================
        async function api(path, options={}) {
            const headers = {
                'apikey': SUPABASE_KEY,
                'Content-Type': 'application/json',
                'Prefer': 'return=representation',
                ...options.headers
            };
            const res = await fetch(SUPABASE_URL + path, {...options, headers});
            const data = await res.json();
            if (!res.ok) throw new Error(data.message || data.msg || 'Request failed');
            return data;
        }

        // ==================== AUTH ====================
        function switchAuthTab(tab) {
            authMode = tab;
            document.querySelectorAll('.auth-tab').forEach(b => {
                b.classList.toggle('active', b.textContent.toLowerCase().includes(tab));
            });
            $('registerFields').classList.toggle('hidden', tab==='login');
            $('authBtn').textContent = tab==='login' ? 'Login' : 'Register';
        }

        async function handleAuth(e) {
            e.preventDefault();
            const btn = $('authBtn');
            btn.disabled = true;

            const email = $('email').value.trim();
            const password = $('password').value.trim();

            try {
                if (authMode === 'register') {
                    const slot = Math.floor(Math.random() * 90000) + 10000;
                    const newUser = {
                        slot, email, password,
                        full_name: $('fullName').value.trim(),
                        id_name: $('idName').value.trim(),
                        id_number: $('idNumber').value.trim(),
                        balance: 0, loan_status: 'none', loan_amount: 0, verified: false
                    };
                    await api('/rest/v1/users', {method:'POST', body:JSON.stringify(newUser)});
                    toast('Registration successful! Please login.', 'success');
                    switchAuthTab('login');
                    btn.disabled = false;
                    return;
                }

                const users = await api(`/rest/v1/users?email=eq.${encodeURIComponent(email)}&select=*`);
                if (users.length === 0) throw new Error('User not found');
                if (users[0].password !== password) throw new Error('Invalid password');

                currentUser = users[0];
                localStorage.setItem('cryptex_user', JSON.stringify(currentUser));

                $('authScreen').classList.add('hidden');
                $('dashboardScreen').classList.remove('hidden');
                initDashboard();
                toast(`Welcome ${currentUser.full_name || currentUser.email}!`, 'success');
            } catch (error) {
                showAlert('authAlert', error.message, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('cryptex_user');
            $('dashboardScreen').classList.add('hidden');
            $('authScreen').classList.remove('hidden');
            toast('Logged out', 'info');
        }

        // ==================== DASHBOARD ====================
        async function initDashboard() {
            await loadUser();
            updateAll();
            populateSymbols();
            updateTradeInfo();
            updateChart();
            setInterval(updatePrices, 3000);
            setInterval(updateAll, 5000);
        }

        async function loadUser() {
            try {
                const users = await api(`/rest/v1/users?email=eq.${encodeURIComponent(currentUser.email)}&select=*`);
                if (users.length > 0) {
                    currentUser = users[0];
                    localStorage.setItem('cryptex_user', JSON.stringify(currentUser));
                }
            } catch(e) { console.error(e); }
        }

        function updatePrices() {
            stocks.forEach(s => {
                s.price = +(s.price * (1 + (Math.random()-0.5)*0.02)).toFixed(2);
                s.change = +(s.change + (Math.random()-0.5)*0.3).toFixed(2);
            });
        }

        function updateAll() {
            $('displayName').textContent = currentUser?.full_name || currentUser?.email || '-';
            $('displayBalance').textContent = fmt(currentUser?.balance || 0);
            const vb = $('verifyBadge');
            vb.textContent = currentUser?.verified ? '✅ Verified' : '⏳ Unverified';
            vb.style.background = currentUser?.verified ? 'rgba(14,203,129,0.15)' : 'rgba(246,70,93,0.15)';
            vb.style.color = currentUser?.verified ? 'var(--green)' : 'var(--red)';

            $('ovBalance').textContent = fmt(currentUser?.balance || 0);
            $('ovTrades').textContent = holdings.length;
            $('ovLoan').textContent = fmt(currentUser?.loan_amount || 0);
            $('ovStatus').textContent = currentUser?.loan_status || 'none';

            $('marketOverview').innerHTML = stocks.slice(0,6).map(s => `
                <div style="display:flex;justify-content:space-between;align-items:center;padding:14px;border-bottom:1px solid var(--border);">
                    <div style="display:flex;align-items:center;gap:10px;">
                        <div class="coin-icon ${s.class||'btc'}">${s.icon||'●'}</div>
                        <div><strong>${s.symbol}</strong><br><small style="color:var(--text3);">${s.name}</small></div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:600;">${fmt(s.price)}</div>
                        <div class="${s.change>=0?'price-up':'price-down'}">${s.change>=0?'+':''}${s.change}%</div>
                    </div>
                </div>
            `).join('');

            $('marketTable').innerHTML = stocks.map(s => `
                <tr>
                    <td>
                        <div class="coin-info">
                            <div class="coin-icon ${s.class||'btc'}">${s.icon||'●'}</div>
                            <div><strong>${s.symbol}</strong><br><small style="color:var(--text3);">${s.name}</small></div>
                        </div>
                    </td>
                    <td style="font-weight:600;">${fmt(s.price)}</td>
                    <td class="${s.change>=0?'price-up':'price-down'}">${s.change>=0?'+':''}${s.change}%</td>
                    <td><button class="btn-sm" onclick="goTrade('${s.symbol}')">Trade</button></td>
                </tr>
            `).join('');

            if (holdings.length === 0) {
                $('holdingsTable').innerHTML = '<tr><td colspan="5" style="text-align:center;padding:40px;color:var(--text3);">No holdings</td></tr>';
            } else {
                $('holdingsTable').innerHTML = holdings.map(h => {
                    const stock = stocks.find(s => s.symbol === h.symbol);
                    const cp = stock?.price || h.price;
                    const pnl = (cp - h.price) * h.qty;
                    return `
                        <tr>
                            <td><strong>${h.symbol}</strong></td>
                            <td>${h.qty}</td>
                            <td>${fmt(h.price)}</td>
                            <td>${fmt(cp)}</td>
                            <td class="${pnl>=0?'price-up':'price-down'}">${pnl>=0?'+':''}${fmt(pnl)}</td>
                        </tr>
                    `;
                }).join('');
            }
        }

        // ==================== TRADE ====================
        function populateSymbols() {
            $('tradeSymbol').innerHTML = stocks.map(s => `<option value="${s.symbol}">${s.symbol} - ${s.name}</option>`).join('');
        }

        function goTrade(symbol) {
            switchView('trade');
            $('tradeSymbol').value = symbol;
            updateTradeInfo();
            updateChart();
        }

        function setTradeMode(mode) {
            tradeMode = mode;
            document.querySelectorAll('.trade-tab').forEach(t => {
                t.classList.remove('active', 'buy', 'sell');
            });
            const btn = mode === 'buy' ? document.querySelector('.trade-tab:first-child') : document.querySelector('.trade-tab:last-child');
            btn.classList.add('active', mode);
            $('orderBtn').className = `order-btn ${mode}`;
            $('orderBtn').textContent = mode === 'buy' ? 'Buy' : 'Sell';
        }

        function updateTradeInfo() {
            const symbol = $('tradeSymbol').value;
            const stock = stocks.find(s => s.symbol === symbol);
            if (stock) $('currentPrice').textContent = fmt(stock.price);
            calcTotal();
        }

        function calcTotal() {
            const qty = parseFloat($('tradeQty').value) || 0;
            const stock = stocks.find(s => s.symbol === $('tradeSymbol').value);
            $('tradeTotal').value = fmt(qty * (stock?.price || 0));
        }

        function setPct(pct) {
            const stock = stocks.find(s => s.symbol === $('tradeSymbol').value);
            if (!stock || tradeMode !== 'buy') return;
            const maxQty = (currentUser?.balance || 0) / stock.price;
            $('tradeQty').value = (maxQty * pct / 100).toFixed(4);
            calcTotal();
        }

        async function executeTrade() {
            const symbol = $('tradeSymbol').value;
            const qty = parseFloat($('tradeQty').value);
            const stock = stocks.find(s => s.symbol === symbol);

            if (!qty || qty <= 0) { showAlert('tradeAlert', 'Enter valid quantity', 'error'); return; }
            const total = qty * stock.price;

            if (tradeMode === 'buy' && total > (currentUser?.balance || 0)) {
                showAlert('tradeAlert', 'Insufficient balance', 'error');
                return;
            }

            try {
                const newBalance = tradeMode === 'buy' ? currentUser.balance - total : currentUser.balance + total;
                await api(`/rest/v1/users?email=eq.${encodeURIComponent(currentUser.email)}`, {
                    method:'PATCH', body:JSON.stringify({balance:+newBalance.toFixed(2)})
                });

                if (tradeMode === 'buy') {
                    const existing = holdings.find(h => h.symbol === symbol);
                    if (existing) {
                        existing.price = ((existing.price * existing.qty) + total) / (existing.qty + qty);
                        existing.qty += qty;
                    } else {
                        holdings.push({symbol, qty, price: stock.price});
                    }
                }

                await loadUser();
                updateAll();
                $('tradeQty').value = '';
                toast(`${tradeMode.toUpperCase()} ${qty} ${symbol} @ ${fmt(stock.price)}`, 'success');
            } catch(error) {
                showAlert('tradeAlert', error.message, 'error');
            }
        }

        // ==================== WALLET ====================
        async function deposit() {
            const amount = parseFloat($('depositAmt').value);
            if (!amount || amount <= 0) { showAlert('depositAlert', 'Enter valid amount', 'error'); return; }
            try {
                const newBalance = (currentUser.balance||0) + amount;
                await api(`/rest/v1/users?email=eq.${encodeURIComponent(currentUser.email)}`, {
                    method:'PATCH', body:JSON.stringify({balance:+newBalance.toFixed(2)})
                });
                await loadUser();
                updateAll();
                $('depositAmt').value = '';
                toast(`Deposited ${fmt(amount)}`, 'success');
            } catch(error) { showAlert('depositAlert', error.message, 'error'); }
        }

        async function withdraw() {
            const amount = parseFloat($('withdrawAmt').value);
            if (!amount || amount <= 0) { showAlert('withdrawAlert', 'Enter valid amount', 'error'); return; }
            if (amount > (currentUser?.balance||0)) { showAlert('withdrawAlert', 'Insufficient balance', 'error'); return; }
            try {
                const newBalance = currentUser.balance - amount;
                await api(`/rest/v1/users?email=eq.${encodeURIComponent(currentUser.email)}`, {
                    method:'PATCH', body:JSON.stringify({balance:+newBalance.toFixed(2)})
                });
                await loadUser();
                updateAll();
                $('withdrawAmt').value = '';
                toast(`Withdrawn ${fmt(amount)}`, 'success');
            } catch(error) { showAlert('withdrawAlert', error.message, 'error'); }
        }

        // ==================== CHART ====================
        function updateChart() {
            const symbol = $('tradeSymbol').value;
            const stock = stocks.find(s => s.symbol === symbol);
            if (!stock) return;

            const labels = [], prices = [];
            let p = stock.price * 0.9;
            for (let i=0; i<24; i++) {
                labels.push(i+':00');
                p *= (1 + (Math.random()-0.5)*0.03);
                prices.push(p.toFixed(2));
            }

            const ctx = $('priceChart');
            if (!ctx) return;
            if (chart) chart.destroy();

            chart = new Chart(ctx, {
                type:'line',
                data:{labels, datasets:[{
                    data:prices,
                    borderColor:stock.change>=0?'#0ecb81':'#f6465d',
                    backgroundColor:stock.change>=0?'rgba(14,203,129,0.1)':'rgba(246,70,93,0.1)',
                    fill:true,tension:0.4,pointRadius:0,borderWidth:2
                }]},
                options:{
                    responsive:true,maintainAspectRatio:false,
                    plugins:{legend:{display:false}},
                    scales:{x:{display:false},y:{grid:{color:'rgba(255,255,255,0.05)'}}}
                }
            });
        }

        // ==================== VIEWS ====================
        function switchView(view) {
            const titles = {overview:'📊 Overview',market:'📈 Market',trade:'💹 Trade',portfolio:'💼 Portfolio',wallet:'💰 Wallet'};
            $('pageTitle').textContent = titles[view] || view;
            ['overview','market','trade','portfolio','wallet'].forEach(v => $(v+'View').classList.toggle('hidden', v!==view));
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.textContent.toLowerCase().includes(view));
            });
            if (view==='trade') { updateTradeInfo(); updateChart(); }
        }

        function filterMarket(q) {
            const filtered = stocks.filter(s => s.symbol.toLowerCase().includes(q.toLowerCase()) || s.name.toLowerCase().includes(q.toLowerCase()));
            $('marketTable').innerHTML = filtered.map(s => `
                <tr>
                    <td><div class="coin-info"><div class="coin-icon ${s.class||'btc'}">${s.icon||'●'}</div><div><strong>${s.symbol}</strong><br><small style="color:var(--text3);">${s.name}</small></div></div></td>
                    <td style="font-weight:600;">${fmt(s.price)}</td>
                    <td class="${s.change>=0?'price-up':'price-down'}">${s.change>=0?'+':''}${s.change}%</td>
                    <td><button class="btn-sm" onclick="goTrade('${s.symbol}')">Trade</button></td>
                </tr>
            `).join('');
        }

        async function refreshAll() { await loadUser(); updateAll(); toast('Refreshed', 'info'); }

        // ==================== INIT ====================
        const saved = localStorage.getItem('cryptex_user');
        if (saved) {
            try {
                currentUser = JSON.parse(saved);
                $('authScreen').classList.add('hidden');
                $('dashboardScreen').classList.remove('hidden');
                initDashboard();
            } catch(e) { localStorage.removeItem('cryptex_user'); }
        }

        updatePrices();
        setInterval(updatePrices, 3000);
    </script>
</body>
</html>
